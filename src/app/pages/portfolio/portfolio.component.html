<!-- Page Title -->
<div class="page-title" data-aos="fade">
  <div class="heading">
    <div class="container">
      <div class="row d-flex justify-content-center text-center">
        <div class="col-lg-8">
          <h1>Projets</h1>
        </div>
      </div>
    </div>
  </div>
  <nav class="breadcrumbs">
    <div class="container">
      <ol>
        <li><a routerLink="/">Accueil</a></li>
        <li class="current">Projets</li>
      </ol>
    </div>
  </nav>
</div>

<!-- Portfolio Section -->
<section id="portfolio" class="portfolio section">
  <div class="container">
    <div class="isotope-layout" data-default-filter="*" data-layout="masonry" data-sort="original-order">
      <div class="row gy-4 isotope-container" data-aos="fade-up" data-aos-delay="200">

        @for (project of projects; track project.id) {
          <div class="col-lg-4 col-md-6 portfolio-item isotope-item" [class]="project.filterClass">
            <div class="portfolio-content h-100">
              <img [src]="project.image" class="img-fluid" alt="">
              <div class="portfolio-info">
                <h4>{{ project.title }}</h4>
                @if (project.subtitle) {
                  <p>{{ project.subtitle }}</p>
                }
                <a [routerLink]="['/project', project.id]" title="More Details" class="details-link">
                  <i class="bi bi-link-45deg"></i>
                </a>
              </div>
            </div>
          </div>
        }

      </div>
    </div>
  </div>
</section>
